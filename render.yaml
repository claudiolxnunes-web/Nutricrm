services:
  - type: web
    name: nutricrm
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nutricrm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: nutricrm-db
    plan: free
    region: oregon
